name: RID Realtime Data Tracker

on:
  schedule:
    # สั่งให้ระบบรันอัตโนมัติทุกๆ นาทีที่ 0 ของทุกชั่วโมง (เช่น 11:00, 12:00)
    - cron: '0,30 * * * *'
  workflow_dispatch: # เปิดปุ่มกดรันแบบแมนนวลเพื่อทดสอบระบบได้เอง

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์บอทในการแก้ไขและอัปโหลดไฟล์ในคลังข้อมูล

    steps:
    # 1. ดึงโค้ดจาก Repository ออกมาใช้งาน
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. จำลองระบบ Python 3.10 ขึ้นมาบนเครื่องเซิร์ฟเวอร์ GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. ติดตั้งไลบรารีที่โค้ดเรียกใช้งาน
    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas geopandas shapely

    # 4. รันโค้ด Python เพื่อดึงและแปลงไฟล์ข้อมูล
    - name: Run Data Script
      run: python main.py

    # 5. สั่งตรวจสอบไฟล์ หากมีการเปลี่ยนแปลงข้อมูลจริง ให้ทำการอัปเดตไฟล์กลับเข้าคลังข้อมูล
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rid_realtime.geojson
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update realtime data: $(date)" && git push)
